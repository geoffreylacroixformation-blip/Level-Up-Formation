<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <!-- Dégradé Cyan pour hexagone (gauche) -->
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0077FF"/>
    </linearGradient>

    <!-- Dégradé Violet/Magenta pour hexagone (droite) -->
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>

    <!-- Dégradé pour le texte UP -->
    <linearGradient id="gradTextUp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>

    <!-- Dégradé cyan pour sous-titre -->
    <linearGradient id="gradSub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0077FF"/>
    </linearGradient>

    <!-- Filtre lueur standard -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filtre lueur forte pour l'œil -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filtre lueur légère pour texte -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond noir -->
  <rect width="100%" height="100%" fill="#000000"/>

  <!-- Décorations Tech Gauche (Cyan) -->
  <g opacity="0.5" filter="url(#glow)">
    <!-- Lignes horizontales avec marches -->
    <line x1="30" y1="120" x2="120" y2="120" stroke="#00F0FF" stroke-width="2"/>
    <line x1="120" y1="120" x2="120" y2="160" stroke="#00F0FF" stroke-width="2"/>
    <line x1="120" y1="160" x2="180" y2="160" stroke="#00F0FF" stroke-width="2"/>
    <circle cx="120" cy="120" r="3" fill="#00F0FF"/>
    <circle cx="120" cy="160" r="3" fill="#00F0FF"/>

    <line x1="40" y1="200" x2="100" y2="200" stroke="#00F0FF" stroke-width="1.5"/>
    <line x1="100" y1="200" x2="100" y2="230" stroke="#00F0FF" stroke-width="1.5"/>
    <line x1="100" y1="230" x2="150" y2="230" stroke="#00F0FF" stroke-width="1.5"/>
    <circle cx="100" cy="200" r="2.5" fill="#00F0FF"/>
    <circle cx="100" cy="230" r="2.5" fill="#00F0FF"/>

    <line x1="50" y1="280" x2="130" y2="280" stroke="#00F0FF" stroke-width="1.5"/>
    <line x1="30" y1="350" x2="90" y2="350" stroke="#00F0FF" stroke-width="1"/>
    <line x1="90" y1="350" x2="90" y2="380" stroke="#00F0FF" stroke-width="1"/>
    <line x1="60" y1="420" x2="140" y2="420" stroke="#00F0FF" stroke-width="1"/>

    <!-- Points dispersés -->
    <rect x="60" y="140" width="4" height="4" fill="#00F0FF" opacity="0.6"/>
    <rect x="140" y="180" width="3" height="3" fill="#00F0FF" opacity="0.4"/>
    <rect x="80" y="300" width="3" height="3" fill="#00F0FF" opacity="0.5"/>
    <rect x="110" y="370" width="4" height="4" fill="#00F0FF" opacity="0.3"/>
    <rect x="70" y="450" width="3" height="3" fill="#00F0FF" opacity="0.5"/>
  </g>

  <!-- Décorations Tech Droite (Violet) -->
  <g opacity="0.5" filter="url(#glow)">
    <line x1="880" y1="120" x2="970" y2="120" stroke="#D500F9" stroke-width="2"/>
    <line x1="880" y1="120" x2="880" y2="160" stroke="#D500F9" stroke-width="2"/>
    <line x1="820" y1="160" x2="880" y2="160" stroke="#D500F9" stroke-width="2"/>
    <circle cx="880" cy="120" r="3" fill="#D500F9"/>
    <circle cx="880" cy="160" r="3" fill="#D500F9"/>

    <line x1="900" y1="200" x2="960" y2="200" stroke="#D500F9" stroke-width="1.5"/>
    <line x1="900" y1="200" x2="900" y2="230" stroke="#D500F9" stroke-width="1.5"/>
    <line x1="850" y1="230" x2="900" y2="230" stroke="#D500F9" stroke-width="1.5"/>
    <circle cx="900" cy="200" r="2.5" fill="#D500F9"/>
    <circle cx="900" cy="230" r="2.5" fill="#D500F9"/>

    <line x1="870" y1="280" x2="950" y2="280" stroke="#D500F9" stroke-width="1.5"/>
    <line x1="910" y1="350" x2="970" y2="350" stroke="#D500F9" stroke-width="1"/>
    <line x1="910" y1="350" x2="910" y2="380" stroke="#D500F9" stroke-width="1"/>
    <line x1="860" y1="420" x2="940" y2="420" stroke="#D500F9" stroke-width="1"/>

    <rect x="940" y="140" width="4" height="4" fill="#D500F9" opacity="0.6"/>
    <rect x="860" y="180" width="3" height="3" fill="#D500F9" opacity="0.4"/>
    <rect x="920" y="300" width="3" height="3" fill="#D500F9" opacity="0.5"/>
    <rect x="890" y="370" width="4" height="4" fill="#D500F9" opacity="0.3"/>
    <rect x="930" y="450" width="3" height="3" fill="#D500F9" opacity="0.5"/>
  </g>

  <!-- Hexagone (Cadre) -->
  <g transform="translate(500, 300)">
    <!-- Hexagone principal -->
    <polygon points="0,-170 148,-85 148,85 0,170 -148,85 -148,-85"
             fill="none" stroke="url(#gradCyan)" stroke-width="6"
             filter="url(#glow)"/>

    <!-- Hexagone intérieur (fin) -->
    <polygon points="0,-155 135,-77.5 135,77.5 0,155 -135,77.5 -135,-77.5"
             fill="none" stroke="url(#gradCyan)" stroke-width="1.5"
             opacity="0.3"/>

    <!-- Diamant au sommet -->
    <polygon points="0,-190 8,-182 0,-174 -8,-182"
             fill="#00F0FF" filter="url(#strongGlow)"/>
  </g>

  <!-- Figure Hacker (centrée dans l'hexagone) -->
  <g transform="translate(500, 310)">
    <!-- Ombre du corps / épaules -->
    <path d="M -120 140 Q 0 120 120 140 L 130 200 L -130 200 Z"
          fill="#060608"/>

    <!-- Capuche (forme ample) -->
    <path d="M -110 140 Q -100 80 -60 30 Q -30 -10 0 -20 Q 30 -10 60 30 Q 100 80 110 140 Q 60 120 0 120 Q -60 120 -110 140 Z"
          fill="#080810"/>

    <!-- Intérieur capuche (zone visage sombre) -->
    <path d="M -70 40 Q -40 10 0 5 Q 40 10 70 40 Q 40 60 0 65 Q -40 60 -70 40 Z"
          fill="#020205"/>

    <!-- Rim light gauche (Cyan) -->
    <path d="M -110 140 Q -100 80 -60 30 Q -30 -10 0 -20"
          fill="none" stroke="#00F0FF" stroke-width="3" filter="url(#glow)"/>

    <!-- Rim light droite (Violet) -->
    <path d="M 110 140 Q 100 80 60 30 Q 30 -10 0 -20"
          fill="none" stroke="#D500F9" stroke-width="3" filter="url(#glow)"/>

    <!-- Rim light épaules gauche -->
    <path d="M -110 140 Q -60 120 -120 140"
          fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

    <!-- Rim light épaules droite -->
    <path d="M 110 140 Q 60 120 120 140"
          fill="none" stroke="#D500F9" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

    <!-- Œil (diamant/amande) -->
    <path d="M -6 0 L 0 -6 L 6 0 L 0 6 Z"
          fill="#00FFFF" filter="url(#strongGlow)"/>

    <!-- Reflet dans l'œil -->
    <circle cx="-1" cy="-1" r="1.5" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Texte LEVEL UP -->
  <g font-family="'Orbitron', 'Rajdhani', 'Arial Black', sans-serif" font-weight="900">
    <!-- LEVEL (blanc) -->
    <text x="280" y="520" font-size="88" fill="#F0F0F0" letter-spacing="4"
          filter="url(#textGlow)">LEVEL</text>

    <!-- UP (dégradé violet) -->
    <text x="590" y="520" font-size="88" fill="url(#gradTextUp)" letter-spacing="4"
          filter="url(#glow)">UP</text>
  </g>

  <!-- Sous-titre -->
  <g>
    <!-- Ligne gauche -->
    <line x1="250" y1="555" x2="380" y2="555" stroke="#00E5FF" stroke-width="1.5"
          filter="url(#glow)"/>

    <!-- Texte -->
    <text x="500" y="560" font-family="'Orbitron', 'Rajdhani', Arial, sans-serif"
          font-size="18" fill="url(#gradSub)" text-anchor="middle"
          letter-spacing="6" filter="url(#textGlow)">ÉCOLE CYBER VIRTUELLE</text>

    <!-- Ligne droite -->
    <line x1="620" y1="555" x2="750" y2="555" stroke="#00E5FF" stroke-width="1.5"
          filter="url(#glow)"/>
  </g>

  <!-- Chevron bas -->
  <g transform="translate(500, 585)">
    <path d="M -12 0 L 0 12 L 12 0" fill="none" stroke="url(#gradCyan)"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow)"/>
  </g>
</svg>
