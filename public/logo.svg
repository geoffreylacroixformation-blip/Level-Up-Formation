<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Dégradé pour le cadre Hexagone (Cyan à Magenta) -->
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bd00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>

    <!-- Dégradé pour le texte LEVEL (Métallique) -->
    <linearGradient id="textSilver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#909090;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>

    <!-- Dégradé pour le texte UP (Rose/Magenta) -->
    <linearGradient id="textPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff66bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bd00ff;stop-opacity:1" />
    </linearGradient>

    <!-- Filtre de lueur néon -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filtre lueur yeux -->
    <filter id="eyeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filtre ombre pour la capuche -->
    <filter id="hoodShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dégradé radial pour l'éclairage de la capuche -->
    <radialGradient id="hoodLight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="1" />
      <stop offset="70%" stop-color="#0a0a12" stop-opacity="1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </radialGradient>

    <!-- Filtre de lueur légère pour le texte -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond Noir -->
  <rect width="100%" height="100%" fill="#000000" />

  <!-- ============================================== -->
  <!-- HEXAGONE (CADRE)                               -->
  <!-- ============================================== -->
  <g transform="translate(400, 400)">
    <path d="M 0 -280 L 242 -140 L 242 140 L 0 280 L -242 140 L -242 -140 Z"
          fill="rgba(3,3,10,0.4)"
          stroke="url(#frameGradient)"
          stroke-width="12"
          filter="url(#glow)" />

    <!-- Hexagone intérieur (fine ligne) -->
    <path d="M 0 -260 L 225 -130 L 225 130 L 0 260 L -225 130 L -225 -130 Z"
          fill="none"
          stroke="url(#frameGradient)"
          stroke-width="1.5"
          opacity="0.25" />

    <!-- ========== CIRCUITS GAUCHE (CYAN) ========== -->
    <g stroke="#00f3ff" stroke-width="1.8" fill="none" opacity="0.6">
      <line x1="-225" y1="-70" x2="-185" y2="-70" />
      <line x1="-185" y1="-70" x2="-185" y2="-100" />
      <line x1="-185" y1="-100" x2="-145" y2="-100" />
      <circle cx="-185" cy="-70" r="2.5" fill="#00f3ff" opacity="0.7" />
      <circle cx="-185" cy="-100" r="2.5" fill="#00f3ff" opacity="0.7" />

      <line x1="-225" y1="-25" x2="-165" y2="-25" />
      <line x1="-165" y1="-25" x2="-165" y2="5" />
      <line x1="-165" y1="5" x2="-125" y2="5" />
      <circle cx="-165" cy="-25" r="2.5" fill="#00f3ff" opacity="0.7" />
      <circle cx="-165" cy="5" r="2.5" fill="#00f3ff" opacity="0.7" />

      <line x1="-225" y1="35" x2="-175" y2="35" />
      <line x1="-175" y1="35" x2="-175" y2="65" />
      <line x1="-175" y1="65" x2="-135" y2="65" />
      <circle cx="-175" cy="35" r="2.5" fill="#00f3ff" opacity="0.7" />
      <circle cx="-175" cy="65" r="2.5" fill="#00f3ff" opacity="0.7" />

      <line x1="-225" y1="95" x2="-190" y2="95" />
    </g>

    <!-- ========== CIRCUITS DROITE (MAGENTA) ========== -->
    <g stroke="#ff00ff" stroke-width="1.8" fill="none" opacity="0.6">
      <line x1="225" y1="-70" x2="185" y2="-70" />
      <line x1="185" y1="-70" x2="185" y2="-100" />
      <line x1="185" y1="-100" x2="145" y2="-100" />
      <circle cx="185" cy="-70" r="2.5" fill="#ff00ff" opacity="0.7" />
      <circle cx="185" cy="-100" r="2.5" fill="#ff00ff" opacity="0.7" />

      <line x1="225" y1="-25" x2="165" y2="-25" />
      <line x1="165" y1="-25" x2="165" y2="5" />
      <line x1="165" y1="5" x2="125" y2="5" />
      <circle cx="165" cy="-25" r="2.5" fill="#ff00ff" opacity="0.7" />
      <circle cx="165" cy="5" r="2.5" fill="#ff00ff" opacity="0.7" />

      <line x1="225" y1="35" x2="175" y2="35" />
      <line x1="175" y1="35" x2="175" y2="65" />
      <line x1="175" y1="65" x2="135" y2="65" />
      <circle cx="175" cy="35" r="2.5" fill="#ff00ff" opacity="0.7" />
      <circle cx="175" cy="65" r="2.5" fill="#ff00ff" opacity="0.7" />

      <line x1="225" y1="95" x2="190" y2="95" />
    </g>

    <!-- ========== FIGURE CENTRALE - HACKER HOODY ========== -->
    <g transform="translate(0, 0)">

      <!-- Ombre sous le personnage -->
      <ellipse cx="0" cy="100" rx="80" ry="15" fill="#000000" opacity="0.4" filter="url(#hoodShadow)" />

      <!-- Corps / Hoody (forme ample) -->
      <path d="M -85 100 
               Q -90 60 -80 20 
               Q -70 -10 -50 -30 
               Q -20 -55 0 -60 
               Q 20 -55 50 -30 
               Q 70 -10 80 20 
               Q 90 60 85 100 
               Q 60 110 0 112 
               Q -60 110 -85 100 Z"
            fill="#080810" />

      <!-- Capuche (partie haute - forme arrondie) -->
      <path d="M -80 20 
               Q -85 -20 -60 -55 
               Q -30 -80 0 -85 
               Q 30 -80 60 -55 
               Q 85 -20 80 20 
               Q 70 -5 40 -25 
               Q 0 -40 -40 -25 
               Q -70 -5 -80 20 Z"
            fill="url(#hoodLight)" />

      <!-- Intérieur de la capuche (zone sombre du visage) -->
      <path d="M -55 -10 
               Q -50 -40 0 -55 
               Q 50 -40 55 -10 
               Q 35 -25 0 -30 
               Q -35 -25 -55 -10 Z"
            fill="#020208" />

      <!-- Effet d'ombre sur le visage (caché) -->
      <ellipse cx="0" cy="-20" rx="35" ry="22" fill="#000005" opacity="0.9" />

      <!-- Rim light gauche (cyan) - contour capuche -->
      <path d="M -80 20 Q -85 -20 -60 -55 Q -30 -80 0 -85"
            fill="none" stroke="#00f3ff" stroke-width="2.5" opacity="0.8"
            filter="url(#glow)" />

      <!-- Rim light droite (magenta) - contour capuche -->
      <path d="M 80 20 Q 85 -20 60 -55 Q 30 -80 0 -85"
            fill="none" stroke="#ff00ff" stroke-width="2.5" opacity="0.8"
            filter="url(#glow)" />

      <!-- Rim light épaules gauche -->
      <path d="M -85 100 Q -90 60 -80 20"
            fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.4"
            filter="url(#glow)" />

      <!-- Rim light épaules droite -->
      <path d="M 85 100 Q 90 60 80 20"
            fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4"
            filter="url(#glow)" />

      <!-- Ligne centrale du hoody (zip) -->
      <line x1="0" y1="-10" x2="0" y2="90" stroke="#111118" stroke-width="1.5" opacity="0.5" />

      <!-- Poches avant -->
      <path d="M -40 60 Q -40 50 -30 50 L 30 50 Q 40 50 40 60 L 40 75 Q 40 80 35 80 L -35 80 Q -40 80 -40 75 Z"
            fill="none" stroke="#12121a" stroke-width="1" opacity="0.6" />

      <!-- Yeux cyan dans l'ombre -->
      <circle cx="-16" cy="-25" r="4" fill="#00f3ff" filter="url(#eyeGlow)" />
      <circle cx="16" cy="-25" r="4" fill="#00f3ff" filter="url(#eyeGlow)" />

      <!-- Reflets dans les yeux -->
      <circle cx="-14" cy="-27" r="1.5" fill="#ffffff" opacity="0.9" />
      <circle cx="18" cy="-27" r="1.5" fill="#ffffff" opacity="0.9" />

      <!-- Lignes lumineuses subtiles sur la capuche -->
      <line x1="-60" y1="-5" x2="-55" y2="15" stroke="#00f3ff" stroke-width="0.8" opacity="0.25" />
      <line x1="60" y1="-5" x2="55" y2="15" stroke="#ff00ff" stroke-width="0.8" opacity="0.25" />
    </g>

    <!-- ========== TEXTE LEVEL UP (BIEN SÉPARÉE) ========== -->
    <g font-family="'Orbitron', 'Rajdhani', 'Arial Black', Helvetica, sans-serif" font-weight="900" text-anchor="middle">
      <!-- LEVEL (gauche) -->
      <text x="-120" y="155" font-size="68" fill="url(#textSilver)" filter="url(#textGlow)" letter-spacing="4">LEVEL</text>
      <!-- UP (droite) -->
      <text x="120" y="155" font-size="68" fill="url(#textPink)" filter="url(#glow)" letter-spacing="4">UP</text>
    </g>

    <!-- ========== SOUS-TITRE ========== -->
    <text x="0" y="195" text-anchor="middle"
          font-family="'Orbitron', 'Rajdhani', Arial, sans-serif"
          font-size="15" font-weight="300" fill="#ffffff" letter-spacing="6"
          filter="url(#textGlow)">ÉCOLE CYBER VIRTUELLE</text>

    <!-- ========== CHEVRON DOUBLE ========== -->
    <g transform="translate(0, 230)">
      <path d="M -14 -6 L 0 6 L 14 -6" fill="none"
            stroke="url(#frameGradient)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow)" />
      <path d="M -14 6 L 0 18 L 14 6" fill="none"
            stroke="url(#frameGradient)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow)" />
    </g>

  </g>
</svg>
